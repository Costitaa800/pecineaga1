<!DOCTYPE html>
<div lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de selectores</title>
    <link rel="stylesheet" href="style.css" />
</head>
<div>
    <h1> Tipos de selectores en CSS</h1>

    <!--Selectores de elemento -->
    <p>Selector de elemento (p) </p>
    <div> Selector de elemento (div) </div>

    <!--Selectores de clase-->
    <p class="rojo">Selector de clase (.rojo)</p>
    <p class="grande">Selector de clase (.grande)</p>
    <p class="rojo grande"> Dos class juntas</p>

    <!--Selector id ID-->
    <p id="unico">Selector de id (#unico )</p>

    <!--Selectores descendientes-->
    <div class="container" >
    <p> Hijo directo</p>
    </div>
    <p>Descendiente anidado</p>
</div>
</div>




</html>
</body>
</html>
