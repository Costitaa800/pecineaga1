<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidades de medida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Unidades de medida</h1>

    <!-- COMPARACION DE UNIDADES -->
    <div class="container" >
        <!--PX: ABSOLUTA - FIJA -->
        <div class="box box-px" >
            <h2>px (200px)</h2>
            <p>Tamano absoluto -fijo</p>
        </div>
    </div>

    <!-- %: RELATIVO AL PADRE -->
<div class="box box-percent">
    <h2> %(50%)</h2>
    <p> Mitad del padre</p>
</div>

<!-- REM: RELATIVO AL ROOT -->
 <div class="box box-rem">
    <h2>REM (15rem)</h2>
    <p>Relativo al HTML</p>
 </div>

 <!-- EM: RELATIVO AL ELEMENTO-->
  <div class="box box-em">
    <h2>EM:(10em)</h2>
    <p> Relativo al elemento padre</p>
  </div>

<!-- VW: VIEWPORT WIDTH -->
 <div class="box box-vw">
    <h2>VW (30vw)</h2>
    <p> 30% del ancho de ña ventaga</p>
 </div>

 <!-- VH:VIEWPORT HEIGHT -->
  <div class="box box-vh">
 <h2>VH (20vh)</h2>
  <p>20% del alto de la ventana</p>
</div>

</class>
</body>
</html>
